<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Mini App</title>
    <!-- Подключаем скрипт Telegram -->
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background-color: var(--tg-theme-bg-color, #ffffff); color: var(--tg-theme-text-color, #000000); }
        button { padding: 10px 20px; font-size: 16px; background-color: var(--tg-theme-button-color, #3390ec); color: var(--tg-theme-button-text-color, #ffffff); border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Привет из Telegram Mini App!</h1>
    <p>Приложение успешно запущено с телефона.</p>
    <button onclick="Telegram.WebApp.close()">Закрыть приложение</button>
    <script>
        // Инициализируем Telegram WebApp
        Telegram.WebApp.ready();
    </script>
</body>
</html>
