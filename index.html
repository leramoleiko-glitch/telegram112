<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Market</title>
    <script src="https://jsdelivr.net"></script>
    <script src="https://telegram.org"></script>
    <style>
        body { background-color: #0b0e14; color: white; font-family: sans-serif; }
    </style>
</head>
<body class="pb-24 p-4 select-none">
    <div class="flex justify-between items-center mb-4">
        <h1 class="text-2xl font-bold">EasyMarket</h1>
        <button class="bg-[#1a1f2c] px-4 py-1.5 rounded-xl text-xs font-semibold text-blue-400">● Кошелёк</button>
    </div>
    <div class="mb-4">
        <input type="text" placeholder="Поиск по ID или названию..." class="w-full bg-[#1a1f2c] text-sm p-3 rounded-xl outline-none border border-transparent focus:border-blue-500">
    </div>
    <div class="grid grid-cols-2 gap-3">
        <!-- Карточка 1 -->
        <div class="bg-[#1a1f2c] rounded-2xl p-3 flex flex-col justify-between border border-gray-800">
            <div class="relative rounded-xl overflow-hidden bg-[#242b3d] aspect-square flex items-center justify-center">
                <span class="absolute top-2 right-2 bg-black/60 text-[10px] px-2 py-0.5 rounded-md font-mono">#37289</span>
                <img src="https://placehold.co" class="w-full h-full object-cover">
            </div>
            <h3 class="font-bold text-sm mt-2">Toy Bear</h3>
            <div class="text-[11px] text-gray-400 my-1">
                <div>M: Citrus</div>
                <div>C: Rare Symbol</div>
            </div>
            <div class="flex justify-between items-center mt-2">
                <span class="text-xs font-bold text-blue-400">◆ 55.1 TON</span>
                <!-- Добавлена функция onclick -->
                <button onclick="sendOrder('Toy Bear', '55.1 TON')" class="bg-blue-600 text-xs px-3 py-1.5 rounded-lg font-medium active:scale-95 transition-transform">Купить</button>
            </div>
        </div>
        <!-- Карточка 2 -->
        <div class="bg-[#1a1f2c] rounded-2xl p-3 flex flex-col justify-between border border-gray-800">
            <div class="relative rounded-xl overflow-hidden bg-[#242b3d] aspect-square flex items-center justify-center">
                <span class="absolute top-2 right-2 bg-black/60 text-[10px] px-2 py-0.5 rounded-md font-mono">#52995</span>
                <img src="https://placehold.co" class="w-full h-full object-cover">
            </div>
            <h3 class="font-bold text-sm mt-2">Input Key</h3>
            <div class="text-[11px] text-gray-400 my-1">
                <div>M: Parking Lot</div>
                <div>C: Rare Symbol</div>
            </div>
            <div class="flex justify-between items-center mt-2">
                <span class="text-xs font-bold text-yellow-500">★ 742</span>
                <!-- Добавлена функция onclick -->
                <button onclick="sendOrder('Input Key', '742 Stars')" class="bg-blue-600 text-xs px-3 py-1.5 rounded-lg font-medium active:scale-95 transition-transform">Купить</button>
            </div>
        </div>
    </div>
    
    <!-- Нижнее меню -->
    <div class="fixed bottom-0 left-0 right-0 bg-[#0b0e14]/90 backdrop-blur-md border-t border-gray-800 py-3 px-6 flex justify-between items-center">
        <div class="flex flex-col items-center text-blue-500 text-xs"><span>🛒</span><span class="text-[10px] font-bold">МАРКЕТ</span></div>
        <div class="flex flex-col items-center text-gray-500 text-xs"><span>📞</span><span class="text-[10px]">НОМЕРА</span></div>
        <div class="flex flex-col items-center text-gray-500 text-xs"><span>🎁</span><span class="text-[10px]">ИНВЕНТАРЬ</span></div>
        <div class="flex flex-col items-center text-gray-500 text-xs"><span>👤</span><span class="text-[10px]">ПРОФИЛЬ</span></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Новая функция отправки заказа в чат бота
        def sendOrder(name, price) {
            const orderData = { item: name, cost: price };
            // Передаем данные боту в виде текста
            tg.sendData(JSON.stringify(orderData));
            // Закрываем мини-приложение
            tg.close();
        }
    </script>
</body>
</html>
